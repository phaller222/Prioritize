version: '3.8'
services:
  db:
    image: postgres:16
    container_name: prioritize-db
    environment:
      POSTGRES_DB: prioritize
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: prioritize-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/prioritize
      SPRING_DATASOURCE_USERNAME: prioritize
      SPRING_DATASOURCE_PASSWORD: prioritize
      SPRING_JPA_HIBERNATE_DDL_AUTO: update