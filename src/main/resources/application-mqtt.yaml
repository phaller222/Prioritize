prioritize:
  mqtt:
    enabled: true
    broker-url: tcp://memoryalpha:1883
    client-id: prioritize-backend
    #username: prioritize
    #password: ${MQTT_PASSWORD:}
    qos: 1
    subscribe-topics:
      - DISCOVERY          # self-registration of devices (type=DISCOVERY)
      - "+/status"         # <uuid>/status: online/offline heartbeats (type=STATUS)
      - "+/values"         # <uuid>/values: telemetry readings (type=VALUE)