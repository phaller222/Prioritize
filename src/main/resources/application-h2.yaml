spring:
  datasource:
    url: jdbc:h2:file:~/prioritize;MODE=PostgreSQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        hbm2ddl.extra_physical_table_types: TABLE
        default_schema: PUBLIC
  h2:
    console:
      enabled: true
      path: /h2-console
logging:
  level:
    org:
      #springframework:
      #  security: DEBUG
      hibernate:
        #SQL: DEBUG
        #orm.results: DEBUG
        #orm.jdbc.bind: TRACE
       # Falls du noch mehr Details zum Schema-Export willst:
        tool.schema: ERROR

flowable:
  database-schema-update: true
  async-executor-activate: true
  check-process-definitions: true