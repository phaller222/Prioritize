spring:
  datasource:
    url: jdbc:h2:file:~/prioritize;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        # Verhindert die "Temporary Table" (HTE) Geschichte von Hibernate 7
        hbm2ddl.extra_physical_table_types: TABLE
        default_schema: PUBLIC
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
flowable:
  database-schema-update: true
  async-executor-activate: true
  check-process-definitions: true