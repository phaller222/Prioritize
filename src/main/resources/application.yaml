spring:
  profiles:
      # Default is the self-contained H2 file DB so a fresh checkout runs with no external
      # setup. Use `postgres` for the shared/production database (e.g. -Dspring.profiles.active=postgres).
      active: h2

  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false

  application:
    name: prioritize

server:
  tomcat:
    basedir: tomcat
    accesslog:
      directory: logs

logging:
  level:
    org.flowable: INFO
  #file:
    #name: logs/Prioritize.log